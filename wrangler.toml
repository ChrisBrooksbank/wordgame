name = "lexicon-forge-push"
main = "workers/push-notifications/worker.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ---------------------------------------------------------------------------
# KV namespace for storing push subscriptions
# Create with: wrangler kv:namespace create PUSH_SUBSCRIPTIONS
# ---------------------------------------------------------------------------
[[kv_namespaces]]
binding = "PUSH_SUBSCRIPTIONS"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_YOUR_KV_NAMESPACE_PREVIEW_ID"

# ---------------------------------------------------------------------------
# Cron triggers
#   "0 9 * * *"  — daily reminder at 09:00 UTC
#   "0 19 * * *" — streak warning at 19:00 UTC
# ---------------------------------------------------------------------------
[triggers]
crons = ["0 9 * * *", "0 19 * * *"]

# ---------------------------------------------------------------------------
# Non-secret environment variables
# ---------------------------------------------------------------------------
[vars]
VAPID_SUBJECT = "mailto:admin@lexiconforge.app"

# ---------------------------------------------------------------------------
# Secrets (set via CLI, never stored in this file)
#
#   wrangler secret put VAPID_PRIVATE_KEY_JWK
#   wrangler secret put VAPID_PUBLIC_KEY
#
# Generate a VAPID key pair with:
#   node -e "
#     const { generateVAPIDKeys } = require('web-push');
#     const keys = generateVAPIDKeys();
#     console.log(JSON.stringify(keys, null, 2));
#   "
# Or use the Web Crypto API:
#   const kp = await crypto.subtle.generateKey({name:'ECDSA',namedCurve:'P-256'},true,['sign','verify']);
#   const priv = JSON.stringify(await crypto.subtle.exportKey('jwk', kp.privateKey));
#   const pub  = btoa(String.fromCharCode(...new Uint8Array(await crypto.subtle.exportKey('raw', kp.publicKey))))
#               .replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
# ---------------------------------------------------------------------------
